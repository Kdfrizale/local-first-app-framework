<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Goal Tracker - Track your Wildly Important Goals with lead and lag measures">
  <title>Goal Tracker - Local First</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C3AED">
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Goal Tracker">
  
  <style>
    #toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
    }
    
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .modal-backdrop.show {
      opacity: 1;
    }
    
    .modal-dialog {
      background: white;
      border-radius: 0.5rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    
    .modal-backdrop.show .modal-dialog {
      transform: scale(1);
    }
    
    .modal-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    
    .progress-ring {
      transform: rotate(-90deg);
    }
    
    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s ease;
    }
    
    .chart-container {
      position: relative;
      height: 200px;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Toast Container -->
  <div id="toast-container"></div>
  
  <!-- Header -->
  <header class="bg-violet-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold">🎯 Goal Tracker</h1>
          <p class="text-violet-200 text-sm">Track your Wildly Important Goals</p>
        </div>
        <div class="flex items-center space-x-3">
          <span id="sync-status" class="text-sm text-violet-200">●</span>
          <button onclick="manualSync()" class="px-4 py-2 bg-violet-700 rounded-md hover:bg-violet-800 text-sm">
            Sync
          </button>
          <button onclick="showSettings()" class="p-2 hover:bg-violet-700 rounded-full">
            ⚙️
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Add Goal Button -->
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold text-gray-800">Your Goals</h2>
      <button onclick="showAddGoal()" class="px-4 py-2 bg-violet-600 text-white rounded-md hover:bg-violet-700">
        + Add Goal
      </button>
    </div>
    
    <!-- Goals Container -->
    <div id="goals-container" class="space-y-6">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <!-- Framework Scripts -->
  <script src="../../core/github-sync.js"></script>
  <script src="../../core/local-storage.js"></script>
  <script src="../../core/sync-controller.js"></script>
  <script src="../../core/router.js"></script>
  <script src="../../core/state.js"></script>
  <script src="../../core/components/toast.js"></script>
  <script src="../../core/components/modal.js"></script>
  <script src="../../core/components/form.js"></script>
  <script src="../../core/components/list.js"></script>
  
  <!-- App Script -->
  <script src="app.js"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
  
</body>
</html>
