<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Family Reading Log - Track books read by family members">
  <title>Reading Log - Local First</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Reading Log">
  
  <style>
    /* Import common styles from template */
    @import url('../../templates/app-template.html');
    
    /* Custom styles for reading log */
    #toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 90vw;
    }
    
    .toast {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border-left: 4px solid;
      opacity: 0;
      transform: translateX(100%);
      transition: all 0.3s ease;
      min-width: 300px;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }
    
    .toast-success { border-left-color: #10B981; }
    .toast-error { border-left-color: #EF4444; }
    .toast-info { border-left-color: #3B82F6; }
    .toast-warning { border-left-color: #F59E0B; }
    
    .toast-icon { font-size: 1.25rem; font-weight: bold; }
    .toast-success .toast-icon { color: #10B981; }
    .toast-error .toast-icon { color: #EF4444; }
    .toast-info .toast-icon { color: #3B82F6; }
    .toast-warning .toast-icon { color: #F59E0B; }
    
    .toast-message { flex: 1; }
    .toast-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6B7280;
      padding: 0;
      line-height: 1;
    }
    .toast-close:hover { color: #374151; }
    
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 1rem;
    }
    
    .modal-backdrop.show { opacity: 1; }
    
    .modal-dialog {
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    
    .modal-backdrop.show .modal-dialog { transform: scale(1); }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid #E5E7EB;
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
    }
    
    .modal-close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6B7280;
      padding: 0;
      line-height: 1;
    }
    .modal-close-btn:hover { color: #374151; }
    
    .modal-body { padding: 1.5rem; }
    
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 1.5rem;
      border-top: 1px solid #E5E7EB;
    }
    
    .offline-indicator {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: #EF4444;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      z-index: 9997;
      display: none;
    }
    
    .offline-indicator.show { display: block; }
    
    .book-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50">
  
  <!-- Navigation -->
  <nav class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <span class="text-2xl mr-2">📚</span>
          <h1 class="text-xl font-bold text-white">Family Reading Log</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button id="add-book-btn" class="px-4 py-2 bg-white text-purple-600 rounded-md hover:bg-purple-50 font-medium">
            + Add Book
          </button>
          <button id="sync-btn" class="px-4 py-2 text-white hover:text-purple-100">
            <span id="sync-icon">🔄</span>
            <span id="sync-text">Sync</span>
          </button>
          <button id="settings-btn" class="px-4 py-2 text-white hover:text-purple-100">
            ⚙️
          </button>
        </div>
      </div>
    </div>
  </nav>
  
  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
          <input 
            type="text" 
            id="search-input"
            placeholder="Search books or authors..."
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Reader</label>
          <select 
            id="reader-filter"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"
          >
            <option value="">All readers</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Sort By</label>
          <select 
            id="sort-select"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"
          >
            <option value="date-desc">Date (newest first)</option>
            <option value="date-asc">Date (oldest first)</option>
            <option value="title">Title (A-Z)</option>
            <option value="author">Author (A-Z)</option>
          </select>
        </div>
      </div>
    </div>
    
    <!-- Statistics -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="stats-container">
      <!-- Stats will be rendered here -->
    </div>
    
    <!-- Books List -->
    <div id="books-container">
      <!-- Books will be rendered here -->
    </div>
    
  </main>
  
  <!-- Offline Indicator -->
  <div id="offline-indicator" class="offline-indicator">
    📡 You are offline. Changes will sync when you're back online.
  </div>
  
  <!-- Framework Core Scripts -->
  <script src="../../core/github-sync.js?v=1775705721"></script>
  <script src="../../core/local-storage.js?v=1775705721"></script>
  <script src="../../core/sync-controller.js?v=1775705721"></script>
  <script src="../../core/router.js?v=1775705721"></script>
  <script src="../../core/state.js?v=1775705721"></script>
  <script src="../../core/components/toast.js?v=1775705721"></script>
  <script src="../../core/components/modal.js?v=1775705721"></script>
  <script src="../../core/components/form.js?v=1775705721"></script>
  <script src="../../core/components/list.js?v=1775705721"></script>
  
  <!-- App Script -->
  <script src="app.js"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.log('Service Worker registration failed', err));
      });
      
      // Force update of service worker and clear old caches
      navigator.serviceWorker.ready.then(registration => {
        registration.update();
      });
      
      // Clear old caches on page load
      if ('caches' in window) {
        caches.keys().then(names => {
          names.forEach(name => {
            if (name !== 'reading-log-v5') {
              caches.delete(name);
            }
          });
        });
      }
    }
  </script>
  
</body>
</html>
