<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reference implementation of a local-first app with GitHub sync">
  <title>Local-First Reference App</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3B82F6">
  
  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Reference App">
  
  <!-- Core Framework Styles -->
  <link rel="stylesheet" href="../../styles/core.css">
  
  <style>
    /* App-specific styles only */
    .task-item {
      transition: all 0.2s ease;
    }
    
    .task-item:hover {
      transform: translateX(4px);
    }
    
    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #9CA3AF;
    }
    
    .priority-high { border-left-color: #EF4444; }
    .priority-medium { border-left-color: #F59E0B; }
    .priority-low { border-left-color: #10B981; }
    
    .filter-active {
      background: #3B82F6;
      color: white;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  
  <!-- Navigation -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4">
      <div class="flex justify-between h-14">
        <div class="flex items-center gap-3">
          <span class="text-2xl">📋</span>
          <h1 class="text-lg font-bold text-gray-900">Reference App</h1>
        </div>
        <div class="flex items-center gap-3">
          <span id="sync-status" class="sync-status">
            <span class="sync-status-dot"></span>
            <span id="sync-status-text">Ready</span>
          </span>
          <button id="sync-btn" class="btn btn-ghost" title="Sync now">
            <span id="sync-icon">🔄</span>
          </button>
          <button id="settings-btn" class="btn btn-ghost" title="Settings">
            ⚙️
          </button>
        </div>
      </div>
    </div>
  </nav>
  
  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-6">
    <div id="app-container">
      <!-- App content will be rendered here -->
    </div>
  </main>
  
  <!-- Offline Indicator -->
  <div id="offline-indicator" class="offline-indicator">
    📡 You're offline. Changes will sync when connected.
  </div>

  <!-- Core Framework Scripts -->
  <script src="../../core/Storage.js"></script>
  <script src="../../core/State.js"></script>
  <script src="../../core/GitHubSync.js"></script>
  <script src="../../core/SyncController.js"></script>
  <script src="../../core/ui/Toast.js"></script>
  <script src="../../core/ui/Modal.js"></script>
  <script src="../../core/ui/Form.js"></script>
  <script src="../../core/ui/List.js"></script>
  <script src="../../core/App.js"></script>
  
  <!-- App Script -->
  <script src="app.js"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed'));
      });
    }
  </script>
</body>
</html>
